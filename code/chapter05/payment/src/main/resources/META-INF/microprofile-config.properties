# MicroProfile Config Properties for Payment Service (Chapter 5)

# OpenAPI Configuration
mp.openapi.scan.disabled=false

# Payment Gateway Configuration
# These properties demonstrate @ConfigProperties grouping
# All properties with prefix "payment.gateway" are automatically
# mapped to PaymentGatewayConfig bean
# Note: Using kebab-case for multi-word property names
payment.gateway.endpoint=https://api.paymentgateway.com/v1
payment.gateway.api-key=demo-api-key-12345
payment.gateway.timeout=5000
payment.gateway.retry-attempts=3
payment.gateway.sandbox-mode=true