# Message Publisher Configuration
mp.messaging.outgoing.hello-out.connector=liberty-kafka
mp.messaging.outgoing.hello-out.topic=hello-topic

# Message Consumer Configuration
mp.messaging.incoming.hello-in.connector=liberty-kafka
mp.messaging.incoming.hello-in.topic=hello-topic
mp.messaging.incoming.hello-in.group.id=hello-consumer-group

# Alternative: In-Memory Connector (for testing without Kafka)
# Uncomment these and comment out the kafka connectors above
# mp.messaging.outgoing.hello-out.connector=smallrye-in-memory
# mp.messaging.incoming.hello-in.connector=smallrye-in-memory

# Kafka connection properties (adjust for your environment)
mp.messaging.connector.liberty-kafka.bootstrap.servers=localhost:9092
mp.messaging.connector.liberty-kafka.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.connector.liberty-kafka.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.connector.liberty-kafka.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.connector.liberty-kafka.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
