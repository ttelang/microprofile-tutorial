# MicroProfile Reactive Messaging Configuration

# Default demo configuration
#
# The Chapter 13 order example uses internal channels within the same
# application, so no connector configuration is required for the default run.
# Uncomment and adapt the Kafka settings below when wiring the channels to an
# external broker.

payment.gateway.endpoint=https://mock-payment-gateway.example/authorize

# Example Kafka connector configuration (commented out)
# Uncomment and configure for production use with Kafka

# mp.messaging.incoming.orders.connector=liberty-kafka
# mp.messaging.incoming.orders.topic=orders-topic
# mp.messaging.incoming.orders.bootstrap.servers=localhost:9092
# mp.messaging.incoming.orders.group.id=order-processors
# mp.messaging.incoming.orders.auto.offset.reset=earliest
# mp.messaging.incoming.orders.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
# mp.messaging.incoming.orders.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

