# Minimal setup: no external broker is required.
# The order service publishes to order-created and consumes from payment-authorized.

# Kafka configuration for production:
mp.messaging.connector.liberty-kafka.bootstrap.servers=localhost:9092
mp.messaging.outgoing.order-created.connector=liberty-kafka
mp.messaging.outgoing.order-created.topic=order-created-topic
mp.messaging.incoming.payment-authorized.connector=liberty-kafka
mp.messaging.incoming.payment-authorized.topic=payment-authorized-topic
mp.messaging.incoming.payment-authorized.group.id=order-service-group
