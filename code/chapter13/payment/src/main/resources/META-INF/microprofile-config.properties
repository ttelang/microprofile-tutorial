# Minimal setup: no external broker.
# PaymentRequestHandler creates order message on the "order-created" channel,
# then processes it and marks it as PAID for downstream flow.
# The order-created and payment-authorized channels are internal — no connector needed.

# Kafka configuration for production:
mp.messaging.connector.liberty-kafka.bootstrap.servers=localhost:9092
mp.messaging.incoming.order-created.connector=liberty-kafka
mp.messaging.incoming.order-created.topic=order-created-topic
mp.messaging.incoming.order-created.group.id=payment-service-group
mp.messaging.outgoing.payment-authorized.connector=liberty-kafka
mp.messaging.outgoing.payment-authorized.topic=payment-authorized-topic

# microprofile-config.properties
mp.openapi.scan.disable=false
product.maintenanceMode=false

# Product Service Configuration
payment.gateway.endpoint=https://api.paymentgateway.com/v1

# Catalog Service Configuration for ProductClientJson
catalog.service.url=http://localhost:5050/catalog/api/products
catalog.service.fallback.url=http://localhost:6050/products
catalog.service.timeout=5000

# MicroProfile Rest Client Configuration for ProductClient (catalog-service)
# Base URL - required property for REST client
catalog-service/mp-rest/url=http://localhost:5050/catalog/api
# Connection timeout in milliseconds
catalog-service/mp-rest/connectTimeout=3000
# Read timeout in milliseconds
catalog-service/mp-rest/readTimeout=5000
# CDI scope for the injected client
catalog-service/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped
# Follow HTTP redirects
catalog-service/mp-rest/followRedirects=true

# MicroProfile Rest Client Configuration for ProductClientWithFilters (catalog-service-filtered)
# This client demonstrates custom filters and interceptors
catalog-service-filtered/mp-rest/url=http://localhost:5050/catalog/api
catalog-service-filtered/mp-rest/connectTimeout=3000
catalog-service-filtered/mp-rest/readTimeout=5000
catalog-service-filtered/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped
catalog-service-filtered/mp-rest/followRedirects=true

# Optional Bearer token for authentication (used by BearerTokenFilter)
# Uncomment and set your token to enable authentication
# catalog-service.bearer.token=your-secret-bearer-token-here
